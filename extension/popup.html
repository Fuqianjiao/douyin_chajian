<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>抖音起号学习看板</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="panel">
    <header>
      <h1>起号学习看板</h1>
      <p id="status">打开抖音关注弹窗后开始采集。</p>
    </header>

    <section class="actions">
      <button id="collect" type="button">开启实时滚动采集</button>
      <button id="capture" type="button">缓存当前主页截图</button>
      <button id="gallery" type="button">打开离线画廊</button>
    </section>

    <section class="summary">
      <div>
        <strong id="count">0</strong>
        <span>已采集账号</span>
      </div>
      <div>
        <strong id="shots">0</strong>
        <span>已缓存截图</span>
      </div>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
