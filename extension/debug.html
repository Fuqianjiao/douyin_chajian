<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>抖音采集自测数据</title>
  <link rel="stylesheet" href="debug.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>采集自测数据</h1>
        <p id="meta">读取本地调试快照中...</p>
      </div>
      <div class="actions">
        <button id="refresh" type="button">刷新</button>
        <button id="export" type="button">导出 JSON</button>
      </div>
    </header>

    <section class="stats" id="stats"></section>
    <section class="block">
      <h2>解析出的账号</h2>
      <div id="users" class="table"></div>
    </section>
    <section class="block">
      <h2>可见行原始数据</h2>
      <div id="rows" class="rows"></div>
    </section>
    <section class="block">
      <h2>弹窗根节点候选</h2>
      <pre id="dialog"></pre>
    </section>
    <section class="block">
      <h2>诊断信息</h2>
      <pre id="diagnostics"></pre>
    </section>
  </main>
  <script src="debug.js"></script>
</body>
</html>
