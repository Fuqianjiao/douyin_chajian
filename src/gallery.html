<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>抖音起号学习画廊</title>
    <link rel="stylesheet" href="gallery.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>抖音起号学习画廊</h1>
          <p id="meta">读取本地采集数据中...</p>
        </div>
        <div class="actions">
          <button id="autoShot" type="button">仅补缺失截图</button>
          <button id="batchMode" type="button">批量标签</button>
          <button id="stopShot" type="button" disabled>停止</button>
          <button id="logs" type="button">查看日志</button>
          <button id="export" type="button">导出 JSON</button>
        </div>
      </header>
      <div id="captureStatus" class="capture-status"></div>
      <section class="filters">
        <div class="quick-filter">
          <input id="nameSearch" type="search" placeholder="博主名称">
          <button id="toggleAdvanced" type="button">更多筛选</button>
        </div>
        <div id="advancedFilters" class="advanced-filters" hidden>
          <label>
            标签
            <select id="tagFilter">
              <option value="">请选择</option>
            </select>
          </label>
          <label>
            截图状态
            <select id="screenshotFilter">
              <option value="">请选择</option>
              <option value="with">已有截图</option>
              <option value="missing">缺少截图</option>
            </select>
          </label>
          <label>
            备注状态
            <select id="noteFilter">
              <option value="">请选择</option>
              <option value="with">已有备注</option>
              <option value="missing">无备注</option>
            </select>
          </label>
          <label>
            备注内容
            <input id="noteSearch" type="search" placeholder="输入备注关键词">
          </label>
          <div class="filter-actions">
            <button id="applyFilters" type="button">筛选</button>
            <button id="resetFilters" type="button">重置</button>
          </div>
        </div>
        <nav id="folders" class="folders"></nav>
      </section>
      <section id="batchBar" class="batch-bar" hidden>
        <div>
          <strong id="batchCount">已选 0 个</strong>
          <p>从平台现存标签中选择，可批量添加或移除。每个博主保留 1-6 个标签。</p>
        </div>
        <div class="batch-controls">
          <button id="selectVisible" type="button">全选当前结果</button>
          <button id="clearSelection" type="button">取消选择</button>
          <div id="batchTagSelect" class="batch-tag-list" role="group" aria-label="选择批量操作标签"></div>
          <button id="batchAddTags" class="batch-primary" type="button">批量添加</button>
          <button id="batchRemoveTags" type="button">批量移除</button>
          <button id="batchDelete" class="batch-danger" type="button">批量删除</button>
        </div>
        <p id="batchHint" class="hint"></p>
      </section>
      <section id="content"></section>
    </main>
    <div id="toast" class="toast" hidden></div>
    <div id="editorModal" class="modal" hidden>
      <div class="modal-panel">
        <div class="modal-head">
          <h2 id="editorTitle">编辑资料</h2>
          <button id="editorClose" type="button">关闭</button>
        </div>
        <label>
          自定义标签
          <div class="tag-editor">
            <input id="tagInput" type="text" maxlength="16" placeholder="输入标签，回车或点击添加">
            <button id="addTag" type="button">添加</button>
          </div>
        </label>
        <p id="tagHint" class="hint">AI 标签 + 自定义标签最多 6 个，至少保留 1 个 AI 标签。</p>
        <div id="editorTags" class="editor-tag-list tag-list" aria-label="当前已选标签"></div>
        <div class="note-section">
          <div class="note-section-head">
            <span>备注</span>
            <span class="hint">支持文本和图片，文本内容参与搜索</span>
          </div>
          <textarea id="noteText" rows="3" placeholder="记录值得学习的点、选题、脚本结构、风格等"></textarea>
          <div class="note-images">
            <label class="note-image-add" for="noteImages">
              <span>＋ 添加图片</span>
              <input id="noteImages" type="file" accept="image/*" multiple hidden>
            </label>
            <div id="notePreview" class="note-preview"></div>
          </div>
        </div>
        <div class="modal-actions">
          <button id="saveEditor" type="button">保存</button>
        </div>
      </div>
    </div>
    <div id="logsModal" class="modal" hidden>
      <div class="modal-panel logs-panel">
        <div class="modal-head">
          <h2>操作日志</h2>
          <button id="logsClose" type="button">关闭</button>
        </div>
        <div id="logsContent" class="logs-content"></div>
      </div>
    </div>
    <div id="confirmModal" class="modal" hidden>
      <div class="modal-panel confirm-panel">
        <div class="modal-head">
          <h2 id="confirmTitle">确认操作</h2>
        </div>
        <p id="confirmMessage" class="confirm-message"></p>
        <div class="modal-actions confirm-actions">
          <button id="confirmCancel" type="button">取消</button>
          <button id="confirmOk" class="danger-button" type="button">确认</button>
        </div>
      </div>
    </div>
    <script src="gallery.js"></script>
  </body>
</html>
